<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loom realtime demo</title>
    <!-- Paint the scheme-matched background before the bundled CSS loads, so a dark OS doesn't
         flash white on reload (styles.css is imported by the JS module, not linked here). -->
    <style>
      :root {
        color-scheme: light dark;
        background: light-dark(#f6f6f9, #0d0d12);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/demo/main.tsx"></script>
  </body>
</html>
