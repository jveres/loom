<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Loom">
  <defs>
    <linearGradient id="loom-a" x1="16" y1="16" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b6cff"/>
      <stop offset="1" stop-color="#5b8cff"/>
    </linearGradient>
    <linearGradient id="loom-b" x1="36" y1="36" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4ee"/>
      <stop offset="1" stop-color="#0ea5b7"/>
    </linearGradient>
  </defs>
  <!-- two interlocked links: warp over weft at one crossing, under at the other -->
  <rect x="16" y="16" width="44" height="44" rx="15" stroke="url(#loom-a)" stroke-width="11"/>
  <rect x="36" y="36" width="44" height="44" rx="15" stroke="url(#loom-b)" stroke-width="11"/>
  <path d="M27 60 H45" stroke="url(#loom-a)" stroke-width="11" stroke-linecap="round"/>
</svg>
